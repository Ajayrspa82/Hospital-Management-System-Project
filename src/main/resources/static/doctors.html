<!doctype html>
<html lang="en">
<head>
  <title>Amaze Care • Find a Doctor</title>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="/favicon.ico"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/app.css"/>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.8/dist/axios.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/shell.js"></script>

</head>
<body>
<div id="app-navbar"></div>
<script>Shell.pageBg('/assets/img/dashboard-bg.jpeg', true); Shell.boot();</script>

<section class="py-5">
  <div class="container">
    <div class="glass-card p-4 p-lg-5 mb-4">
      <div class="row g-3 align-items-center">
        <div class="col-lg-5">
          <div class="section-title">Find a Doctor</div>
          <div class="small-muted mt-2">Explore our doctor directory and find the right specialist for your healthcare needs</div>
        </div>
        <div class="col-lg-7">
          <form id="findDoctorForm" class="row g-2">
            <div class="col-md-7"><input class="form-control" id="findText" placeholder="Search by doctor name or specialization"></div>
            <div class="col-md-3"><select class="form-select" id="findSpecialization"><option value="">All specializations</option></select></div>
            <div class="col-md-2"><button class="btn btn-ac w-100">Search</button></div>
          </form>
        </div>
      </div>
    </div>
    <div class="row g-4" id="doctorDirectory"></div>
  </div>
</section>

<div id="app-footer"></div>
<div class="toast-container position-fixed top-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
Shell.boot();
(async function() {
  try {
    const [doctors, specs] = await Promise.all([Api.get('/api/doctors'), Api.get('/api/specializations')]);
    const specEl = document.getElementById('findSpecialization');
    specEl.innerHTML += specs.map(s => `<option value="${s.specializationName}">${s.specializationName}</option>`).join('');
    const box = document.getElementById('doctorDirectory');
    const qFromUrl = new URLSearchParams(location.search).get('q') || '';
    document.getElementById('findText').value = qFromUrl;
    function render(list) {
      box.innerHTML = list.map(d => `
        <div class="col-md-6 col-xl-4">
          <div class="ac-card p-4 h-100">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <div class="card-title-strong fs-5">${d.name}</div>
                <div class="small-muted">${d.specializationName || 'Specialization not available'}</div>
              </div>
              <span class="info-chip">${d.experience || 0} years</span>
            </div>
            <div class="small-muted"><strong class="text-dark">Qualification:</strong> ${d.qualification || '-'}</div>
            <div class="small-muted mt-2"><strong class="text-dark">Designation:</strong> ${d.designation || '-'}</div>
            <div class="d-flex gap-2 mt-4">
              <a class="btn btn-ac flex-fill" href="/login.html">Book Appointment</a>
              <a class="btn btn-ac-outline flex-fill" href="/about.html">View Hospital</a>
            </div>
          </div>
        </div>`).join('') || '<div class="empty-state">No doctors matched your filters.</div>';
    }
    function applyFilter(e) {
      if (e) e.preventDefault();
      const text = document.getElementById('findText').value.trim().toLowerCase();
      const spec = document.getElementById('findSpecialization').value.trim().toLowerCase();
      render(doctors.filter(d => {
        const hitText = !text || (d.name || '').toLowerCase().includes(text) || (d.specializationName || '').toLowerCase().includes(text);
        const hitSpec = !spec || (d.specializationName || '').toLowerCase() === spec;
        return hitText && hitSpec;
      }));
    }
    document.getElementById('findDoctorForm').addEventListener('submit', applyFilter);
    applyFilter();
  } catch (err) {
    document.getElementById('doctorDirectory').innerHTML = `<div class="empty-state">${Api.friendlyError(err)}</div>`;
  }
})();
</script>
</body>
</html>
