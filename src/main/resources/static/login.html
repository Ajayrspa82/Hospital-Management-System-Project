<!doctype html>
<html lang="en">
<head>
<title>Amaze Care • Login</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="icon" href="/favicon.ico"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/app.css"/>

<script src="https://cdn.jsdelivr.net/npm/axios@1.7.8/dist/axios.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/shell.js"></script>

</head>

<body>

<div id="app-navbar"></div>

<script>
Shell.pageBg('/assets/img/auth-bg.jpeg', true);
Shell.boot();
</script>

<section class="auth-wrap">
<div class="container">

<div class="glass-card auth-card p-4 p-lg-5">

<div class="row g-4 align-items-center">

<div class="col-lg-5">

<span class="info-chip mb-3">Secure access</span>

<div class="section-title">Login</div>


</div>


<div class="col-lg-7">

<form id="loginForm" class="row g-3">

<div class="col-12">
<label class="form-label">Email</label>
<input id="loginEmail" class="form-control" required type="email" placeholder="name@example.com">
</div>

<div class="col-12">
<label class="form-label">Password</label>
<input id="loginPassword" class="form-control" required type="password" placeholder="Your password">
</div>

<!-- ✅ ROLE DROPDOWN ADDED -->
<div class="col-12">
<label class="form-label">Role</label>
<select id="loginRole" class="form-control" required>
<option value="">Select Role</option>
<option value="PATIENT">Patient</option>
<option value="DOCTOR">Doctor</option>
<option value="ADMIN">Admin</option>
</select>
</div>

<div class="col-12 d-flex justify-content-between align-items-center">

<div class="small-muted" id="loginMessage"></div>

<a href="/register.html" class="small">Create patient account</a>

</div>

<div class="col-12">
<button class="btn btn-ac w-100 py-3">Login</button>
</div>

</form>

</div>

</div>

</div>

</div>
</section>

<div id="app-footer"></div>

<div class="toast-container position-fixed top-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.getElementById('loginMessage').textContent = Shell.query('msg') || '';

document.getElementById('loginForm').addEventListener('submit', async (e) => {

e.preventDefault();

try {

const role = document.getElementById('loginRole').value;

const res = await Auth.login(
document.getElementById('loginEmail').value,
document.getElementById('loginPassword').value
);

Api.toast(res.message || 'Login successful.', 'success');

/* ✅ redirect using selected role */
setTimeout(() => Auth.gotoRoleDashboard(role), 500);

}

catch (err) {

Api.toast(Api.friendlyError(err), 'error');

}

});

</script>

</body>
</html>
