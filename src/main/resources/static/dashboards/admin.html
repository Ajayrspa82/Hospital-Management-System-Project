<!doctype html>
<html lang="en"><head><title>Amaze Care • Admin Dashboard</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="/favicon.ico"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/app.css"/>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.8/dist/axios.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/shell.js"></script>
<script src="/assets/js/admin.js"></script></head>
<body>
<div id="app-navbar"></div>
<script>Shell.pageBg('/assets/img/admin-dashboard-bg.jpeg', true); Shell.boot();</script>
<section class="page-shell">
  <div class="container">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
      <div>
        <div class="page-title">Admin Dashboard</div>
        <div class="page-sub">Manage doctors, patients, appointments and reports.</div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-6"><div class="metric-box"><h3 id="metricPatients">0</h3><p>Total patients</p></div></div>
      <div class="col-md-6"><div class="metric-box"><h3 id="metricConsultations">0</h3><p>Total consultations</p></div></div>
    </div>

    <div class="glass-card p-4 mb-4" id="doctorFormSection">
      <div class="card-title-strong fs-4 mb-3" id="doctorFormTitle">Add New Doctor</div>
      <form id="doctorForm" class="row g-3">
        <input type="hidden" id="doctorId">
        <div class="col-md-4"><label class="form-label">Name</label><input id="doctorName" class="form-control" required></div>
        <div class="col-md-4"><label class="form-label">Qualification</label><input id="doctorQualification" class="form-control" required></div>
        <div class="col-md-4"><label class="form-label">Experience (Years)</label><input id="doctorExperience" class="form-control" type="number" required></div>
        <div class="col-md-6"><label class="form-label">Designation</label><input id="doctorDesignation" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Specialization</label><select id="doctorSpecializationId" class="form-select" required></select></div>
        <div class="col-12"><button class="btn btn-ac px-4">Save Doctor</button></div>
      </form>
    </div>

    <div class="glass-card p-4 mb-4">
      <div class="card-title-strong fs-4 mb-3">Doctors</div>
      <div class="table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>Name</th><th>Specialization</th><th>Experience</th><th>Designation</th><th>Actions</th></tr></thead><tbody id="adminDoctors"></tbody></table></div>
    </div>

    <div class="glass-card p-4 mb-4">
      <div class="card-title-strong fs-4 mb-3">Patients</div>
      <div class="table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>Name</th><th>Mobile</th><th>Email</th><th>Gender</th><th>Actions</th></tr></thead><tbody id="adminPatients"></tbody></table></div>
    </div>

    <div class="glass-card p-4 mb-4">
      <div class="card-title-strong fs-4 mb-3">Appointments</div>
      <div class="table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>Patient ID</th><th>Doctor ID</th><th>Date</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead><tbody id="adminAppointments"></tbody></table></div>
    </div>

  
</section>
<div id="app-footer"></div>
<div class="toast-container position-fixed top-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>AdminApp.init();</script>
</body></html>
